name: Actualizar resultados Mundial 2026

on:
  schedule:
    - cron: '*/5 * * * *'   # fallback — GitHub lo throttlea, el trigger real es cron-job.org
  workflow_dispatch:          # disparado externamente por cron-job.org cada 2 min

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Actualizar resultados desde ESPN
        run: python3 update_data.py

      - name: Publicar si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # fetch + reset --soft para que el push nunca falle por conflicto
          git fetch origin
          git reset --soft origin/main
          git add data.js
          if git diff --staged --quiet; then
            echo "Sin cambios — nada que publicar."
          else
            git commit -m "Resultados $(date -u '+%Y-%m-%d %H:%M') UTC [auto]"
            git push
            echo "✓ data.js publicado en GitHub Pages"
          fi
