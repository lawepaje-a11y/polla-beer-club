name: Actualizar resultados Mundial 2026

on:
  schedule:
    - cron: '*/5 * * * *'   # fallback — GitHub lo throttlea, el trigger real es cron-job.org
  workflow_dispatch:          # disparado externamente por cron-job.org cada 2 min

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true   # si llega un run nuevo, cancela el anterior en lugar de solapar

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sincronizar + Actualizar resultados desde ESPN
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 1. Sincronizar al estado MÁS RECIENTE antes de correr el script.
          #    Esto evita que update_data.py cargue un data.js desactualizado
          #    cuando hay dos runs concurrentes (cron-job.org cada 2 min).
          git fetch origin
          git reset --hard origin/main
          # 2. Correr el script contra el data.js más nuevo
          python3 update_data.py
          # 3. Si hay cambios, publicar
          git add data.js
          if git diff --staged --quiet; then
            echo "Sin cambios — nada que publicar."
          else
            git commit -m "Resultados $(date -u '+%Y-%m-%d %H:%M') UTC [auto]"
            git push
            echo "✓ data.js publicado en GitHub Pages"
          fi
