name: Actualizar resultados Mundial 2026

on:
  schedule:
    - cron: '0 13 * * *'   # 08:00am Colombia (UTC-5) — tras partidos de mañana
    - cron: '0 18 * * *'   # 01:00pm Colombia         — tras partidos de tarde
    - cron: '0 23 * * *'   # 06:00pm Colombia         — tras partidos de noche
    - cron: '0 5  * * *'   # 12:00am Colombia         — cierre del día
  workflow_dispatch:        # ejecución manual desde github.com/.../actions

permissions:
  contents: write           # necesario para hacer commit de data.js

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Actualizar resultados desde ESPN
        run: python3 update_data.py

      - name: Publicar si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --staged --quiet; then
            echo "Sin cambios — nada que publicar."
          else
            git commit -m "Resultados $(date '+%Y-%m-%d') [auto]"
            git push
            echo "✓ data.js publicado en GitHub Pages"
          fi
