<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Polla Beer Club 2026</title>
  <script src="data.js"></script>
  <style>
    :root {
      --bg:#0f172a; --surface:#1e293b; --surface2:#334155; --border:#475569;
      --text:#f1f5f9; --muted:#94a3b8; --accent:#3b82f6; --green:#22c55e;
      --red:#ef4444; --yellow:#f59e0b; --blue-l:#1e3a5f; --purple:#7c3aed;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;height:100vh;overflow:hidden}

    /* ── Auth overlay ── */
    #auth-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:1rem;padding:2rem;width:380px}
    .auth-card h2{margin-bottom:.4rem;font-size:1.1rem}
    .auth-card p{font-size:.82rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.5}
    .auth-input{width:100%;padding:.7rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:.5rem;color:var(--text);font-size:.95rem;margin-bottom:.75rem}
    .auth-input:focus{outline:none;border-color:var(--accent)}
    .auth-btn{width:100%;padding:.7rem;background:var(--accent);color:#fff;border:none;border-radius:.5rem;font-size:.95rem;cursor:pointer;font-weight:600}
    .auth-btn:hover{filter:brightness(1.1)}
    .auth-error{color:var(--red);font-size:.82rem;margin-top:.5rem;min-height:1.2em}
    .auth-link{font-size:.75rem;color:var(--muted);margin-top:.75rem;text-align:center}
    .auth-link a{color:var(--accent)}

    /* ── Header ── */
    #header{display:flex;align-items:center;gap:.6rem;padding:.5rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);height:50px;flex-shrink:0}
    #header h1{font-size:.82rem;font-weight:800;color:var(--muted);white-space:nowrap;letter-spacing:.05em}
    .nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.3rem .65rem;border-radius:.4rem;cursor:pointer;font-size:.85rem;line-height:1}
    .nav-btn:hover{background:var(--border)}
    #participant-sel{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.3rem .5rem;border-radius:.4rem;font-size:.82rem;cursor:pointer;max-width:220px}
    #changes-badge{background:var(--yellow);color:#000;font-size:.7rem;padding:.15rem .5rem;border-radius:.3rem;font-weight:700;display:none;white-space:nowrap}
    #status-msg{font-size:.75rem;color:var(--muted);white-space:nowrap;min-width:140px}

    /* ── Toast ── */
    #toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
      background:#1e293b;border:1px solid var(--border);border-radius:.65rem;
      padding:.75rem 1.4rem;font-size:.87rem;font-weight:600;
      box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:9999;
      display:none;max-width:90vw;text-align:center;pointer-events:none}
    #toast.ok{border-color:var(--green);color:var(--green)}
    #toast.err{border-color:var(--red);color:var(--red);pointer-events:auto;cursor:pointer}
    #save-btn{margin-left:auto;background:var(--green);color:#fff;border:none;padding:.38rem 1.1rem;border-radius:.5rem;font-size:.85rem;cursor:pointer;font-weight:700;white-space:nowrap;transition:background .15s}
    #save-btn:disabled{background:var(--surface2);color:var(--muted);cursor:default}
    #save-btn.saving{background:var(--yellow);color:#000}
    #logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.25rem .6rem;border-radius:.4rem;cursor:pointer;font-size:.72rem}
    #logout-btn:hover{color:var(--red);border-color:var(--red)}

    /* ── Main layout ── */
    #main{display:flex;height:calc(100vh - 50px)}

    /* ── Image panel ── */
    #img-panel{width:45%;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
    #img-controls{display:flex;align-items:center;gap:.4rem;padding:.35rem .75rem;background:var(--surface2);border-bottom:1px solid var(--border);font-size:.75rem;color:var(--muted);flex-shrink:0}
    #zoom-level{font-weight:700;color:var(--text);min-width:38px;text-align:center}
    .zoom-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.15rem .5rem;border-radius:.3rem;cursor:pointer;font-size:.8rem;line-height:1.4}
    .zoom-btn:hover{background:var(--border)}
    #img-viewport{flex:1;overflow:hidden;cursor:grab;position:relative;background:#080d18}
    #img-viewport.dragging{cursor:grabbing}
    #planilla-img{position:absolute;transform-origin:0 0;user-select:none;max-width:none;display:block}

    /* ── Edit panel ── */
    #edit-panel{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
    #edit-scroll{padding:.5rem .6rem 0;flex-shrink:0}
    #participant-info{background:var(--surface);border:1px solid var(--border);border-radius:.6rem;padding:.6rem .85rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
    #participant-info .pi-name{font-weight:700;font-size:.9rem}
    #participant-info .pi-pts{font-size:.8rem;color:var(--muted)}
    #participant-info .pi-pts span{color:var(--accent);font-weight:700}

    /* ── Panel tabs ── */
    .panel-tabs{display:flex;gap:.35rem;padding:.4rem .6rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    .ptab{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:.28rem .75rem;border-radius:.4rem;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .12s}
    .ptab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .ptab:hover:not(.active){background:var(--border);color:var(--text)}

    /* ── Group blocks ── */
    .grp-block{margin-bottom:.4rem;border:1px solid var(--border);border-radius:.5rem;overflow:hidden}
    .grp-hd{display:flex;align-items:center;gap:.5rem;padding:.38rem .75rem;background:var(--surface2);cursor:pointer;user-select:none;transition:background .12s}
    .grp-hd:hover{background:var(--border)}
    .grp-tag{background:var(--accent);color:#fff;padding:.1rem .45rem;border-radius:.25rem;font-size:.68rem;font-weight:800;letter-spacing:.05em}
    .grp-chev{margin-left:auto;font-size:.8rem;color:var(--muted);transition:transform .15s}
    .grp-block.collapsed .grp-body{display:none}
    .grp-block.collapsed .grp-chev{transform:rotate(-90deg)}
    .grp-body table{width:100%;border-collapse:collapse;font-size:.77rem}
    .grp-body thead th{background:var(--surface);color:var(--muted);font-size:.67rem;font-weight:600;padding:.25rem .45rem;text-align:left;border-bottom:1px solid var(--border)}
    .grp-body td{padding:.28rem .45rem;border-bottom:1px solid rgba(71,85,105,.3);vertical-align:middle}
    .grp-body tr:last-child td{border-bottom:none}
    .grp-body tr:hover td{background:rgba(255,255,255,.02)}
    .grp-body tr.played td{background:rgba(34,197,94,.04)}
    .pnum{color:var(--muted);font-size:.68rem;width:26px;white-space:nowrap}
    .team-cell{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
    .score-wrap{display:flex;align-items:center;gap:.25rem;justify-content:center}
    .score-input{width:30px;text-align:center;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:.3rem;padding:.18rem .1rem;font-size:.82rem;font-weight:700;-moz-appearance:textfield}
    .score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button{-webkit-appearance:none}
    .score-input:focus{outline:none;border-color:var(--accent);background:var(--blue-l)}
    .score-input.changed{border-color:var(--yellow)!important;background:rgba(245,158,11,.18)!important}
    .score-dash{color:var(--muted);font-weight:700;font-size:.85rem}
    .real-score{font-size:.72rem;color:var(--muted);text-align:center;white-space:nowrap}
    .real-score.jugado{color:var(--green)}

    /* ── Elim blocks ── */
    .elim-block{margin-bottom:.4rem;border:1px solid var(--border);border-radius:.5rem;overflow:hidden}
    .elim-hd{display:flex;align-items:center;gap:.5rem;padding:.38rem .75rem;background:var(--surface2);cursor:pointer;user-select:none;transition:background .12s}
    .elim-hd:hover{background:var(--border)}
    .elim-tag{background:var(--purple);color:#fff;padding:.1rem .45rem;border-radius:.25rem;font-size:.68rem;font-weight:800;letter-spacing:.05em;white-space:nowrap}
    .elim-chev{margin-left:auto;font-size:.8rem;color:var(--muted);transition:transform .15s}
    .elim-block.collapsed .elim-body{display:none}
    .elim-block.collapsed .elim-chev{transform:rotate(-90deg)}
    .elim-body table{width:100%;border-collapse:collapse;font-size:.77rem}
    .elim-body thead th{background:var(--surface);color:var(--muted);font-size:.67rem;font-weight:600;padding:.25rem .45rem;text-align:left;border-bottom:1px solid var(--border)}
    .elim-body td{padding:.28rem .45rem;border-bottom:1px solid rgba(71,85,105,.3);vertical-align:middle}
    .elim-body tr:last-child td{border-bottom:none}
    .elim-body tr:hover td{background:rgba(255,255,255,.02)}
    .elim-body tr.played td{background:rgba(34,197,94,.04)}
    .team-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:.3rem;padding:.2rem .4rem;font-size:.78rem;min-width:0}
    .team-input:focus{outline:none;border-color:var(--accent);background:var(--blue-l)}
    .team-input.changed{border-color:var(--yellow)!important;background:rgba(245,158,11,.18)!important}
    .vs-sep{color:var(--muted);font-weight:700;padding:0 .3rem;white-space:nowrap;font-size:.8rem}
    .warn-team{border-color:var(--red)!important;background:rgba(239,68,68,.12)!important}
  </style>
</head>

<script>
/* ════════════════════════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════════════════════════ */
const REPO      = 'lawepaje-a11y/polla-beer-club';
const API_BASE  = 'https://api.github.com/repos/' + REPO + '/contents/';
const GRUPOS    = ['A','B','C','D','E','F','G','H','I','J','K','L'];
const TOKEN_BLOB = '6AvbHVwCz3gPT5XjPRXVu93eUnjA9sOKF1pEDpCECJuwFX+QDWYzfm494iFeZ1FzmeEh70w/eVR3WsniCld40Gs/igSYNDZoj3CP/K+Id3Lqnnu8';

const FASE_ORDER = ['DIECISEISAVOS','OCTAVOS','CUARTOS','SEMIFINAL','TERCER_PUESTO','FINAL'];
const FASE_LABEL_ADMIN = {
  DIECISEISAVOS:'Dieciseisavos de Final',
  OCTAVOS:'Octavos de Final',
  CUARTOS:'Cuartos de Final',
  SEMIFINAL:'Semifinal',
  TERCER_PUESTO:'Tercer Puesto',
  FINAL:'Final 🏆'
};
const FASE_PTS = {DIECISEISAVOS:3,OCTAVOS:5,CUARTOS:10,SEMIFINAL:20,TERCER_PUESTO:20,FINAL:50};

// Equipos válidos para validación (resaltar en rojo los que no están)
const VALID_TEAMS = new Set([
  'Alemania','Arabia Saudita','Argelia','Argentina','Australia','Austria',
  'Bosnia y Herz.','Brasil','Bélgica','Cabo Verde','Canadá','Catar',
  'Chequia','Colombia','Congo','Corea del Sur','Costa de Marfil','Croacia',
  'Curazao','Ecuador','Egipto','Escocia','España','Estados Unidos',
  'Francia','Ghana','Haití','Inglaterra','Irak','Irán','Japón','Jordania',
  'Marruecos','México','Noruega','Nueva Zelanda','Países Bajos','Panamá',
  'Paraguay','Portugal','Senegal','Sudáfrica','Suecia','Suiza','Túnez',
  'Turquía','Uruguay','Uzbekistán'
]);

/* ════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════ */
let D, participants, currentPid;
let changes     = {};   // grupos: partido → [g1, g2]
let origPreds   = {};
let elimChanges = {};   // elim: partido → [eq1, eq2]
let origElimPreds = {};
let ghToken = null;
let _activeTab  = 'grupos';

/* ════════════════════════════════════════════════════════════════
   CRYPTO
════════════════════════════════════════════════════════════════ */
async function decryptToken(pin) {
  const raw  = Uint8Array.from(atob(TOKEN_BLOB), c => c.charCodeAt(0));
  const salt = raw.slice(0, 16);
  const iv   = raw.slice(16, 28);
  const ct   = raw.slice(28);
  const km   = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(pin), 'PBKDF2', false, ['deriveKey']
  );
  const key  = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
  const dec  = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(dec);
}

/* ════════════════════════════════════════════════════════════════
   AUTH
════════════════════════════════════════════════════════════════ */
async function checkPin() {
  const pin = document.getElementById('pin-input').value.trim();
  document.getElementById('pin-error').textContent = '';
  try {
    ghToken = await decryptToken(pin);
    sessionStorage.setItem('a_tok', btoa(ghToken));
    hideAuth();
    initApp();
  } catch {
    document.getElementById('pin-error').textContent = 'PIN incorrecto';
    document.getElementById('pin-input').value = '';
  }
}

function hideAuth() {
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('header').style.display = '';
  document.getElementById('main').style.display = '';
}

function logout() {
  sessionStorage.clear();
  ghToken = null;
  location.reload();
}

document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(); });

/* ════════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════════ */
function initApp() {
  D = window.POLLA_DATA;
  participants = D.participants.slice().sort((a, b) => a.pagina - b.pagina);

  const sel = document.getElementById('participant-sel');
  sel.innerHTML = '';
  participants.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = `${p.pagina}. ${p.nombre}`;
    sel.appendChild(o);
  });

  initImageZoom();
  loadParticipant(participants[0].id);
}

/* ════════════════════════════════════════════════════════════════
   TAB TOGGLE
════════════════════════════════════════════════════════════════ */
function showPanelTab(tab) {
  _activeTab = tab;
  document.getElementById('groups-container').style.display = tab === 'grupos' ? '' : 'none';
  document.getElementById('elim-container').style.display   = tab === 'eliminatorias' ? '' : 'none';
  document.querySelectorAll('.ptab').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );
}

/* ════════════════════════════════════════════════════════════════
   PARTICIPANT
════════════════════════════════════════════════════════════════ */
function loadParticipant(pid) {
  const totalPending = Object.keys(changes).length + Object.keys(elimChanges).length;
  if (totalPending > 0) {
    if (!confirm('Tienes cambios sin guardar. ¿Continuar de todas formas?')) {
      document.getElementById('participant-sel').value = currentPid;
      return;
    }
  }
  currentPid = String(pid);
  changes     = {};
  elimChanges = {};
  updateBadge();

  document.getElementById('participant-sel').value = pid;
  const p = participants.find(x => x.id == pid);
  const padded = String(p.pagina).padStart(3, '0');
  const img = document.getElementById('planilla-img');
  img.src = `planillas/p${padded}.jpg`;
  img.onload = () => fitImage();

  renderParticipantInfo(p);
  renderGroups(pid);
  renderElim(pid);
}

function navigate(dir) {
  const idx = participants.findIndex(p => p.id == currentPid);
  const next = participants[idx + dir];
  if (next) loadParticipant(next.id);
}

/* ════════════════════════════════════════════════════════════════
   RENDER — participante info
════════════════════════════════════════════════════════════════ */
function renderParticipantInfo(p) {
  document.getElementById('participant-info').innerHTML = `
    <span class="pi-name">📋 ${p.pagina}. ${p.nombre}</span>
    <span class="pi-pts">Grupos: <span>${p.pts.grupos}</span> pts</span>
    <span class="pi-pts">Elim: <span>${p.pts.eliminatorias}</span> pts</span>
    <span class="pi-pts">Total: <span>${p.pts.total}</span> pts</span>
    <span class="pi-pts" style="color:var(--muted)">Goleador: ${p.goleador || '—'}</span>`;
}

/* ════════════════════════════════════════════════════════════════
   RENDER — grupos
════════════════════════════════════════════════════════════════ */
function renderGroups(pid) {
  const preds = D.predictions.grupos[String(pid)] || {};
  origPreds = {};
  Object.entries(preds).forEach(([k, v]) => { origPreds[k] = Array.isArray(v) ? [...v] : v; });

  const byGrp = {};
  D.matches_grupos.forEach(m => { (byGrp[m.grupo] = byGrp[m.grupo] || []).push(m); });

  let html = '';
  GRUPOS.forEach(grp => {
    const matches = byGrp[grp] || [];
    if (!matches.length) return;
    const played = matches.filter(m => m.jugado).length;
    html += `
    <div class="grp-block collapsed">
      <div class="grp-hd" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="grp-tag">GRUPO ${grp}</span>
        <span style="font-size:.72rem;color:var(--muted);margin-left:.25rem">${played}/6 jugados</span>
        <span class="grp-chev">▾</span>
      </div>
      <div class="grp-body"><table>
        <thead><tr><th>#</th><th>Equipo 1</th><th style="text-align:center">Pred.</th><th>Equipo 2</th><th style="text-align:center">Real</th></tr></thead>
        <tbody>`;
    matches.forEach(m => {
      const pred = preds[m.numero];
      const g1 = pred != null && pred[0] != null ? pred[0] : '';
      const g2 = pred != null && pred[1] != null ? pred[1] : '';
      const realStr = m.jugado ? `${m.g1_real}-${m.g2_real}` : '—';
      html += `
        <tr class="${m.jugado ? 'played' : ''}">
          <td class="pnum">P${m.numero}</td>
          <td class="team-cell" title="${m.eq1}">${m.eq1}</td>
          <td style="text-align:center">
            <div class="score-wrap">
              <input class="score-input" type="number" min="0" max="20"
                value="${g1}" data-partido="${m.numero}" data-side="0"
                oninput="onScoreChange(this)" />
              <span class="score-dash">-</span>
              <input class="score-input" type="number" min="0" max="20"
                value="${g2}" data-partido="${m.numero}" data-side="1"
                oninput="onScoreChange(this)" />
            </div>
          </td>
          <td class="team-cell" title="${m.eq2}">${m.eq2}</td>
          <td class="real-score ${m.jugado ? 'jugado' : ''}">${realStr}</td>
        </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });

  document.getElementById('groups-container').innerHTML = html;
}

/* ════════════════════════════════════════════════════════════════
   RENDER — eliminatorias
════════════════════════════════════════════════════════════════ */
function renderElim(pid) {
  const preds = D.predictions.eliminatorias[String(pid)] || {};
  origElimPreds = {};
  Object.entries(preds).forEach(([k, v]) => { origElimPreds[k] = Array.isArray(v) ? [...v] : v; });

  // Índice por número de partido
  const matchByNum = {};
  D.matches_elim.forEach(m => { matchByNum[m.numero] = m; });

  // Agrupar por fase en orden
  const byFase = {};
  FASE_ORDER.forEach(f => { byFase[f] = []; });
  D.matches_elim.forEach(m => { if (byFase[m.fase]) byFase[m.fase].push(m); });

  // Contar equipos inválidos en este participante
  let warnCount = 0;

  let html = '';
  FASE_ORDER.forEach(fase => {
    const matches = byFase[fase];
    if (!matches.length) return;
    const played = matches.filter(m => m.jugado).length;

    // Detectar errores en esta fase
    let faseWarns = 0;
    matches.forEach(m => {
      const pred = preds[m.numero] || [];
      if (pred[0] && !VALID_TEAMS.has(pred[0])) faseWarns++;
      if (pred[1] && !VALID_TEAMS.has(pred[1])) faseWarns++;
    });
    warnCount += faseWarns;

    html += `
    <div class="elim-block">
      <div class="elim-hd" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="elim-tag">${FASE_LABEL_ADMIN[fase]}</span>
        <span style="font-size:.72rem;color:var(--muted);margin-left:.25rem">${played}/${matches.length} jugados</span>
        ${faseWarns > 0 ? `<span style="font-size:.68rem;color:var(--red);font-weight:700;margin-left:.3rem">⚠ ${faseWarns} error${faseWarns>1?'es':''}</span>` : ''}
        <span class="elim-chev">▾</span>
      </div>
      <div class="elim-body"><table>
        <thead><tr>
          <th style="width:30px">#</th>
          <th>Equipo 1 predicho</th>
          <th style="width:20px"></th>
          <th>Equipo 2 predicho</th>
          <th style="width:120px;text-align:center">Resultado real</th>
        </tr></thead>
        <tbody>`;

    matches.forEach(m => {
      const pred = preds[m.numero] || [null, null];
      const eq1  = pred[0] || '';
      const eq2  = pred[1] || '';
      const warn1 = eq1 && !VALID_TEAMS.has(eq1);
      const warn2 = eq2 && !VALID_TEAMS.has(eq2);

      let realStr = '—';
      if (m.jugado) {
        realStr = `<span style="color:var(--green);font-size:.72rem">${m.eq1_real||'?'} / ${m.eq2_real||'?'}`;
        if (m.eq_ganador) realStr += ` · <strong>🏆${m.eq_ganador}</strong>`;
        realStr += '</span>';
      } else if (m.eq1_real) {
        realStr = `<span style="color:var(--yellow);font-size:.72rem">🔴 ${m.eq1_real} / ${m.eq2_real}</span>`;
      }

      html += `
        <tr class="${m.jugado ? 'played' : ''}">
          <td class="pnum">P${m.numero}</td>
          <td>
            <input class="team-input${warn1 ? ' warn-team' : ''}" list="teams-list"
              value="${escHtml(eq1)}"
              data-partido="${m.numero}" data-side="0"
              oninput="onElimChange(this)"
              placeholder="Equipo 1…"
              title="${warn1 ? '⚠ Equipo no reconocido — posible error OCR' : ''}" />
          </td>
          <td class="vs-sep">vs</td>
          <td>
            <input class="team-input${warn2 ? ' warn-team' : ''}" list="teams-list"
              value="${escHtml(eq2)}"
              data-partido="${m.numero}" data-side="1"
              oninput="onElimChange(this)"
              placeholder="Equipo 2…"
              title="${warn2 ? '⚠ Equipo no reconocido — posible error OCR' : ''}" />
          </td>
          <td style="text-align:center">${realStr}</td>
        </tr>`;
    });
    html += `</tbody></table></div></div>`;
  });

  // Resumen de errores arriba
  if (warnCount > 0) {
    html = `<div style="background:rgba(239,68,68,.1);border:1px solid var(--red);border-radius:.5rem;padding:.5rem .75rem;margin-bottom:.5rem;font-size:.78rem;color:var(--red)">
      ⚠ <strong>${warnCount} equipo${warnCount>1?'s':''} no reconocido${warnCount>1?'s':''}</strong> — resaltados en rojo. Corrígelos usando el datalist.
    </div>` + html;
  } else {
    html = `<div style="background:rgba(34,197,94,.08);border:1px solid var(--green);border-radius:.5rem;padding:.5rem .75rem;margin-bottom:.5rem;font-size:.78rem;color:var(--green)">
      ✅ Todos los equipos son válidos para este participante.
    </div>` + html;
  }

  document.getElementById('elim-container').innerHTML = html;
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ════════════════════════════════════════════════════════════════
   SCORE & TEAM EDITING
════════════════════════════════════════════════════════════════ */
function onScoreChange(el) {
  const partido = el.dataset.partido;
  const side    = parseInt(el.dataset.side);
  const val     = el.value === '' ? null : parseInt(el.value);

  if (!changes[partido]) {
    const orig = origPreds[partido];
    changes[partido] = orig ? [...orig] : [null, null];
  }
  changes[partido][side] = val;

  const orig = origPreds[partido];
  if (orig && changes[partido][0] === orig[0] && changes[partido][1] === orig[1]) {
    delete changes[partido];
  }

  const isChanged = !!changes[partido];
  document.querySelectorAll(`.score-input[data-partido="${partido}"]`)
    .forEach(i => i.classList.toggle('changed', isChanged));

  updateBadge();
}

function onElimChange(el) {
  const partido = el.dataset.partido;
  const side    = parseInt(el.dataset.side);
  const val     = el.value.trim() || null;

  if (!elimChanges[partido]) {
    const orig = origElimPreds[partido];
    elimChanges[partido] = orig ? [...orig] : [null, null];
  }
  elimChanges[partido][side] = val;

  const orig = origElimPreds[partido];
  if (orig && elimChanges[partido][0] === orig[0] && elimChanges[partido][1] === orig[1]) {
    delete elimChanges[partido];
  }

  const isChanged = !!elimChanges[partido];
  document.querySelectorAll(`.team-input[data-partido="${partido}"]`)
    .forEach(i => i.classList.toggle('changed', isChanged));

  // Validar si el equipo es válido
  if (val && !VALID_TEAMS.has(val)) {
    el.classList.add('warn-team');
  } else {
    el.classList.remove('warn-team');
  }

  updateBadge();
}

function updateBadge() {
  const n = Object.keys(changes).length + Object.keys(elimChanges).length;
  const badge = document.getElementById('changes-badge');
  badge.style.display = n > 0 ? '' : 'none';
  const gn = Object.keys(changes).length;
  const en = Object.keys(elimChanges).length;
  badge.textContent = `● ${gn>0?gn+' grp':''}${gn>0&&en>0?' · ':''}${en>0?en+' elim':''}`;
  document.getElementById('save-btn').disabled = n === 0;
}

/* ════════════════════════════════════════════════════════════════
   PUNTOS ELIMINATORIAS (espejo de index.html / v_puntos_eliminatorias)
════════════════════════════════════════════════════════════════ */
function elimPts(pred, match) {
  if (!match.jugado || !pred) return 0;
  const eq1p = pred[0], eq2p = pred[1];
  let pts = 0;
  const base = FASE_PTS[match.fase] || 0;
  if (match.fase === 'FINAL') {
    if (eq1p === match.eq_ganador) pts += 50; else if (eq1p === match.eq1_real || eq1p === match.eq2_real) pts += 30;
    if (eq2p && eq2p !== eq1p) { if (eq2p === match.eq_ganador) pts += 50; else if (eq2p === match.eq1_real || eq2p === match.eq2_real) pts += 30; }
  } else if (match.fase === 'TERCER_PUESTO') {
    if (eq1p === match.eq_ganador) pts += 20; else if (eq1p === match.eq1_real || eq1p === match.eq2_real) pts += 10;
    if (eq2p && eq2p !== eq1p) { if (eq2p === match.eq_ganador) pts += 20; else if (eq2p === match.eq1_real || eq2p === match.eq2_real) pts += 10; }
  } else {
    if (eq1p && (eq1p === match.eq1_real || eq1p === match.eq2_real)) pts += base;
    if (eq2p && eq2p !== eq1p && (eq2p === match.eq1_real || eq2p === match.eq2_real)) pts += base;
  }
  return pts;
}

/* ════════════════════════════════════════════════════════════════
   SAVE TO GITHUB
════════════════════════════════════════════════════════════════ */
function toBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}

function showToast(msg, type = 'ok', durationMs = 5000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = type;
  t.style.display = 'block';
  clearTimeout(t._tid);
  if (durationMs > 0) t._tid = setTimeout(() => { t.style.display = 'none'; }, durationMs);
  if (type === 'err') t.onclick = () => { t.style.display = 'none'; };
  else t.onclick = null;
}

async function fetchSha(token) {
  const r = await fetch(API_BASE + 'data.js', {
    headers: { Authorization: 'token ' + token, Accept: 'application/vnd.github.v3+json' }
  });
  if (!r.ok) throw new Error(`No se pudo leer data.js (${r.status})`);
  const { sha } = await r.json();
  return sha;
}

// Fetch SHA + contenido actual de data.js desde GitHub.
// Evita la race condition con GHA: el save siempre parte del estado
// más reciente del repo, no del estado en memoria al abrir la página.
async function _fetchCurrentData(token) {
  const r = await fetch(API_BASE + 'data.js', {
    headers: { Authorization: 'token ' + token, Accept: 'application/vnd.github.v3+json' }
  });
  if (!r.ok) throw new Error(`No se pudo leer data.js (${r.status})`);
  const file  = await r.json();
  // atob() retorna binary string (Latin-1) — TextDecoder convierte los bytes correctamente a UTF-8
  const bytes = Uint8Array.from(atob(file.content.replace(/\n/g, '')), c => c.charCodeAt(0));
  const text  = new TextDecoder('utf-8').decode(bytes);
  const match = text.match(/window\.POLLA_DATA\s*=\s*([\s\S]+?);\s*$/m);
  if (!match) throw new Error('Formato de data.js inválido al leer desde GitHub');
  return { sha: file.sha, freshD: JSON.parse(match[1]) };
}

async function putDataJs(token, b64, sha, commitMsg) {
  return fetch(API_BASE + 'data.js', {
    method: 'PUT',
    headers: {
      Authorization: 'token ' + token,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ message: commitMsg, content: b64, sha })
  });
}

async function saveChanges() {
  const totalChanges = Object.keys(changes).length + Object.keys(elimChanges).length;
  if (!totalChanges) return;
  const btn = document.getElementById('save-btn');

  btn.disabled = true;
  btn.className = 'saving';
  btn.textContent = '⏳ Guardando…';
  setStatus('Preparando…');

  try {
    const token = ghToken;
    const p     = participants.find(x => x.id == currentPid);

    // ── Fetch datos ACTUALES de GitHub ────────────────────────
    // Partir siempre del estado real del repo evita sobreescribir
    // actualizaciones de GHA que ocurrieron desde que se abrió la página.
    setStatus('Leyendo datos actuales…');
    let { sha, freshD } = await _fetchCurrentData(token);

    // ── Aplicar cambios de grupos sobre datos frescos ─────────
    const gPreds = freshD.predictions.grupos[currentPid] || {};
    Object.entries(changes).forEach(([partido, scores]) => { gPreds[partido] = scores; });
    freshD.predictions.grupos[currentPid] = gPreds;

    // Recalcular pts grupos
    const resultMap = {};
    freshD.matches_grupos.forEach(m => { resultMap[m.numero] = m; });
    let gPts = 0;
    Object.entries(gPreds).forEach(([n, pred]) => {
      const m = resultMap[parseInt(n)];
      if (!m || !m.jugado || pred == null || pred[0] == null || pred[1] == null) return;
      const [g1p, g2p] = pred;
      if (g1p === m.g1_real && g2p === m.g2_real) { gPts += 3; return; }
      if ((g1p > g2p) === (m.g1_real > m.g2_real) && (g1p < g2p) === (m.g1_real < m.g2_real)) gPts += 1;
    });

    // ── Aplicar cambios de eliminatorias sobre datos frescos ──
    const ePreds = freshD.predictions.eliminatorias[currentPid] || {};
    Object.entries(elimChanges).forEach(([partido, teams]) => { ePreds[partido] = teams; });
    freshD.predictions.eliminatorias[currentPid] = ePreds;

    // Recalcular pts eliminatorias
    const matchByNum = {};
    freshD.matches_elim.forEach(m => { matchByNum[m.numero] = m; });
    let ePts = 0;
    Object.entries(ePreds).forEach(([n, pred]) => {
      const m = matchByNum[parseInt(n)];
      if (!m || !m.jugado || !pred) return;
      ePts += elimPts(pred, m);
    });

    // ── Actualizar participante en datos frescos ──────────────
    const participant = freshD.participants.find(x => x.id == currentPid);
    if (participant) {
      participant.pts.grupos        = gPts;
      participant.pts.eliminatorias = ePts;
      participant.pts.total         = gPts + ePts + (participant.pts.goleador || 0);
    }
    freshD.participants.sort((a, b) => b.pts.total - a.pts.total || a.nombre.localeCompare(b.nombre, 'es'));

    // ── Serializar freshD ─────────────────────────────────────
    const _serialize = d => '// Generado automáticamente por update_data.py — no editar manualmente\nwindow.POLLA_DATA = ' +
      JSON.stringify(d, null, 2) + ';\n';

    const nG = Object.keys(changes).length;
    const nE = Object.keys(elimChanges).length;
    const parts = [];
    if (nG) parts.push(`${nG} grupo`);
    if (nE) parts.push(`${nE} elim`);
    const commitMsg = `Admin: pág ${p.pagina} ${p.nombre} — ${parts.join(', ')}`;

    setStatus('Publicando data.js…');
    let putR = await putDataJs(token, toBase64(_serialize(freshD)), sha, commitMsg);

    if (putR.status === 409) {
      // GHA commitó justo entre nuestro fetch y nuestro put: re-fetch y
      // re-aplicar los cambios del admin sobre el estado más reciente.
      setStatus('SHA desactualizado, reintentando…');
      ({ sha, freshD } = await _fetchCurrentData(token));
      freshD.predictions.grupos[currentPid]        = gPreds;
      freshD.predictions.eliminatorias[currentPid] = ePreds;
      const rp = freshD.participants.find(x => x.id == currentPid);
      if (rp) { rp.pts.grupos = gPts; rp.pts.eliminatorias = ePts; rp.pts.total = gPts + ePts + (rp.pts.goleador || 0); }
      freshD.participants.sort((a, b) => b.pts.total - a.pts.total || a.nombre.localeCompare(b.nombre, 'es'));
      putR = await putDataJs(token, toBase64(_serialize(freshD)), sha, commitMsg);
    }

    if (!putR.ok) {
      const err = await putR.json().catch(() => ({}));
      throw new Error((err.message || `HTTP ${putR.status}`) + ` — verifica que el token tenga scope "repo"`);
    }

    // Audit log
    setStatus('Guardando log…');
    await pushCorrectionsLog(token, p, changes, elimChanges);

    // Sincronizar estado local con lo que se publicó en GitHub
    D = freshD;

    // Commit state
    Object.entries(changes).forEach(([k, v]) => { origPreds[k] = Array.isArray(v) ? [...v] : v; });
    Object.entries(elimChanges).forEach(([k, v]) => { origElimPreds[k] = Array.isArray(v) ? [...v] : v; });
    changes     = {};
    elimChanges = {};
    updateBadge();
    document.querySelectorAll('.score-input.changed').forEach(el => el.classList.remove('changed'));
    document.querySelectorAll('.team-input.changed').forEach(el => el.classList.remove('changed'));

    // Actualizar info del participante
    renderParticipantInfo(participants.find(x => x.id == currentPid));

    btn.className = '';
    btn.textContent = '💾 Guardar';
    btn.disabled = true;
    setStatus('✅ Guardado', 4000);
    showToast('✅ Guardado · abre el dashboard en nueva pestaña y presiona Ctrl+Shift+R para ver el cambio', 'ok', 9000);

  } catch (e) {
    console.error('saveChanges error:', e);
    btn.className = '';
    btn.textContent = '💾 Guardar';
    btn.disabled = false;
    setStatus('❌ Error');
    showToast('❌ ' + e.message + ' · toca para cerrar', 'err', 0);
  }
}

async function pushCorrectionsLog(token, participant, grupoSnap, elimSnap) {
  try {
    let existing = {}, sha = null;
    const getR = await fetch(API_BASE + 'corrections.json', {
      headers: { Authorization: 'token ' + token }
    });
    if (getR.ok) {
      const data = await getR.json();
      sha = data.sha;
      existing = JSON.parse(atob(data.content.replace(/\n/g, '')));
    }
    const pagKey = String(participant.pagina);
    if (!existing[pagKey]) existing[pagKey] = {};
    if (!existing[pagKey].grupos) existing[pagKey].grupos = {};
    if (!existing[pagKey].eliminatorias) existing[pagKey].eliminatorias = {};
    Object.entries(grupoSnap).forEach(([p, s]) => { existing[pagKey].grupos[p] = s; });
    Object.entries(elimSnap).forEach(([p, s]) => { existing[pagKey].eliminatorias[p] = s; });
    const body = {
      message: `Corrections: pág ${participant.pagina}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(existing, null, 2)))),
    };
    if (sha) body.sha = sha;
    await fetch(API_BASE + 'corrections.json', {
      method: 'PUT',
      headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  } catch (e) {
    console.warn('corrections.json:', e.message);
  }
}

function setStatus(text, clearAfter = 0) {
  document.getElementById('status-msg').textContent = text;
  if (clearAfter) setTimeout(() => document.getElementById('status-msg').textContent = '', clearAfter);
}

/* ════════════════════════════════════════════════════════════════
   IMAGE ZOOM & PAN
════════════════════════════════════════════════════════════════ */
let scale = 1, tx = 0, ty = 0, dragging = false, startX, startY, startTx, startTy;

function initImageZoom() {
  const vp  = document.getElementById('img-viewport');

  vp.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? -0.12 : 0.12;
    const rect = vp.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const ns = Math.max(0.25, Math.min(6, scale + factor));
    tx = mx - (mx - tx) * (ns / scale);
    ty = my - (my - ty) * (ns / scale);
    scale = ns;
    applyTransform();
  }, { passive: false });

  vp.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startY = e.clientY; startTx = tx; startTy = ty;
    vp.classList.add('dragging');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    tx = startTx + (e.clientX - startX);
    ty = startTy + (e.clientY - startY);
    applyTransform();
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    document.getElementById('img-viewport').classList.remove('dragging');
  });
}

function applyTransform() {
  document.getElementById('planilla-img').style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%';
}

function fitImage() {
  const vp  = document.getElementById('img-viewport');
  const img = document.getElementById('planilla-img');
  if (!img.naturalWidth) return;
  const sx = vp.clientWidth  / img.naturalWidth;
  const sy = vp.clientHeight / img.naturalHeight;
  scale = Math.min(sx, sy, 1);
  tx = (vp.clientWidth  - img.naturalWidth  * scale) / 2;
  ty = (vp.clientHeight - img.naturalHeight * scale) / 2;
  applyTransform();
}

function zoom(delta) {
  const vp = document.getElementById('img-viewport');
  const cx = vp.clientWidth / 2, cy = vp.clientHeight / 2;
  const ns = Math.max(0.25, Math.min(6, scale + delta));
  tx = cx - (cx - tx) * (ns / scale);
  ty = cy - (cy - ty) * (ns / scale);
  scale = ns;
  applyTransform();
}

function resetZoom() { fitImage(); }

/* ── keyboard shortcuts ── */
document.addEventListener('keydown', e => {
  if (document.getElementById('auth-overlay').style.display !== 'none') return;
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveChanges(); }
});

  const stored = sessionStorage.getItem('a_tok');
  if (stored) {
    try { ghToken = atob(stored); hideAuth(); initApp(); } catch {}
  }
});
